<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultor Parcer: Você vende. A Parcer opera.</title>
<meta name="description" content="Você não precisa montar uma corretora para crescer. A Parcer entrega a estrutura operacional completa para consultores de seguros venderem mais, sem exclusividade e mantendo 100% da carteira.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --petroleo:#214247;
    --profundo:#132728;
    --cinza-claro:#DBDBD1;
    --cinza:#9E9D8F;
    --azul:#76ACC1;
    --branco:#FFFFFF;
    --azul-10: rgba(118,172,193,.1);
    --azul-20: rgba(118,172,193,.2);
    --branco-06: rgba(255,255,255,.06);
    --branco-10: rgba(255,255,255,.1);
    --branco-14: rgba(255,255,255,.14);
    --ease: cubic-bezier(.16,.84,.44,1);
    --maxw: 1180px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--branco);
    color:var(--profundo);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  img,svg{display:block;max-width:100%;}
  a{text-decoration:none;color:inherit;}
  ul{list-style:none;}
  button{font-family:inherit;border:none;background:none;cursor:pointer;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}
  .serif{font-family:'Fraunces',serif;font-weight:500;}

  /* ---------- Reveal ---------- */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .9s var(--ease),transform .9s var(--ease);}
  .reveal.is-visible{opacity:1;transform:translateY(0);}
  .reveal-stagger > *{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease),transform .7s var(--ease);}
  .reveal-stagger.is-visible > *{opacity:1;transform:translateY(0);}
  .reveal-stagger.is-visible > *:nth-child(1){transition-delay:.05s;}
  .reveal-stagger.is-visible > *:nth-child(2){transition-delay:.12s;}
  .reveal-stagger.is-visible > *:nth-child(3){transition-delay:.19s;}
  .reveal-stagger.is-visible > *:nth-child(4){transition-delay:.26s;}
  .reveal-stagger.is-visible > *:nth-child(5){transition-delay:.33s;}
  .reveal-stagger.is-visible > *:nth-child(6){transition-delay:.4s;}
  .reveal-stagger.is-visible > *:nth-child(7){transition-delay:.47s;}
  .reveal-stagger.is-visible > *:nth-child(8){transition-delay:.54s;}

  /* ---------- Typography helpers ---------- */
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--azul);
    margin-bottom:20px;
  }
